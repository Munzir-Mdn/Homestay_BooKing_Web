<!DOCTYPE html>
<html lang="ms">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <style>
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    .btn-wa { background-color: #25D366; transition: all 0.3s; }
    .btn-wa:hover { background-color: #128C7E; transform: translateY(-2px); }
  </style>
</head>
<body class="bg-blue-50 min-h-screen font-sans">

  <nav class="bg-blue-700 p-4 text-white shadow-xl sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <span class="text-2xl">🏠</span>
        <h1 class="text-xl font-bold tracking-tight">StayEase Booking</h1>
      </div>
      <div class="space-x-2">
        <button onclick="showSection('booking')" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-800 text-sm font-medium transition">Tempah</button>
        <button onclick="loadAdmin()" class="bg-white text-blue-700 px-4 py-2 rounded-lg hover:bg-gray-100 text-sm font-medium transition shadow">Admin</button>
      </div>
    </div>
  </nav>

  <main id="booking-section" class="container mx-auto max-w-2xl mt-8 mb-12 p-4">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="bg-blue-600 p-6 text-white">
        <h2 class="text-2xl font-bold">Tempah Homestay Anda</h2>
        <p class="text-blue-100 text-sm">Sila isi butiran di bawah untuk menyemak ketersediaan.</p>
      </div>
      
      <form id="bookingForm" onsubmit="handleFormSubmit(this)" class="p-8 space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Penuh</label>
            <input type="text" name="nama" placeholder="Cth: Ahmad Ali" required class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">No. Telefon (WhatsApp)</label>
            <input type="tel" name="telefon" placeholder="Cth: 60123456789" required class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Alamat Emel</label>
            <input type="email" name="emel" placeholder="Cth: ahmad@gmail.com" required class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Pilih Unit</label>
            <select name="lokasi" required class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500">
              <option value="Unit A (Pool View)">Unit A (Pool View)</option>
              <option value="Unit B (Garden View)">Unit B (Garden View)</option>
              <option value="Executive Suite">Executive Suite</option>
            </select>
          </div>
          
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Pakej Penginapan</label>
            <select name="pakej" required class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500">
              <option value="Standard (2H 1M)">Standard (2H 1M)</option>
              <option value="Family (3H 2M)">Family (3H 2M)</option>
              <option value="Long Stay (1 Minggu)">Long Stay (1 Minggu)</option>
            </select>
          </div>
          
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Tarikh Check-in</label>
            <input type="date" id="tarikh" name="tarikh" required class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Anggaran Masa Sampai</label>
            <input type="time" name="masa" required class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Catatan (Jika ada)</label>
          <textarea name="catatan" placeholder="Cth: Tambah extra bed..." class="w-full border-gray-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 h-24"></textarea>
        </div>
        
        <button type="submit" id="submitBtn" class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl hover:bg-blue-800 shadow-lg transition-all transform active:scale-95">
          Sahkan Tempahan Sekarang
        </button>
      </form>
      
      <div id="msg" class="p-8 pt-0 hidden"></div>
    </div>
  </main>

  <div id="admin-section" class="container mx-auto mt-8 p-4 hidden">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="p-6 bg-gray-800 text-white flex justify-between items-center">
        <h2 class="text-xl font-bold">Senarai Tempahan (Admin)</h2>
        <button onclick="loadAdmin()" class="text-sm bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">Refresh Data</button>
      </div>
      <div class="overflow-x-auto p-4">
        <table class="min-w-full table-auto border-collapse">
          <thead>
            <tr id="tableHead" class="bg-gray-100 text-gray-700 text-xs uppercase font-bold"></tr>
          </thead>
          <tbody id="tableBody" class="text-sm text-gray-600"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_WHATSAPP = "60123456789"; // TUKAR NO TELEFON ANDA DI SINI

    // Set tarikh minimum hari ini
    document.getElementById('tarikh').min = new Date().toISOString().split("T")[0];

    function showSection(type) {
      document.getElementById('booking-section').classList.toggle('hidden', type !== 'booking');
      document.getElementById('admin-section').classList.toggle('hidden', type !== 'admin');
      document.getElementById('msg').classList.add('hidden');
    }

    function handleFormSubmit(form) {
      event.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      
      btn.disabled = true;
      btn.innerText = "Sila tunggu...";
      
      const formData = {
        nama: form.nama.value,
        telefon: form.telefon.value,
        emel: form.emel.value,
        lokasi: form.lokasi.value,
        pakej: form.pakej.value,
        tarikh: form.tarikh.value,
        masa: form.masa.value,
        catatan: form.catatan.value
      };

      google.script.run.withSuccessHandler(res => {
        btn.disabled = false;
        btn.innerText = "Sahkan Tempahan Sekarang";
        msg.classList.remove('hidden');
        
        if(res.status === 'success') {
          // Format pesanan WhatsApp
          const waText = `*TEMPAHAN HOMESTAY BARU*%0A` +
                         `----------------------------%0A` +
                         `*ID Booking:* ${res.id}%0A` +
                         `*Nama:* ${formData.nama}%0A` +
                         `*Unit:* ${formData.lokasi}%0A` +
                         `*Tarikh:* ${formData.tarikh}%0A` +
                         `*Pakej:* ${formData.pakej}%0A` +
                         `*Nota:* ${formData.catatan || '-'}%0A` +
                         `----------------------------%0A` +
                         `Mohon admin sahkan tempahan saya segera.`;
          
          const waUrl = `https://wa.me/${ADMIN_WHATSAPP}?text=${waText}`;

          msg.innerHTML = `
            <div class="bg-green-50 p-6 rounded-xl border border-green-200 text-center shadow-inner">
              <div class="text-4xl mb-2">✅</div>
              <h3 class="text-green-800 font-bold text-lg">Tempahan Berjaya Diterima!</h3>
              <p class="text-green-700 text-sm mb-4 font-mono">ID: ${res.id}</p>
              <a href="${waUrl}" target="_blank" class="btn-wa text-white px-6 py-3 rounded-full font-bold inline-flex items-center shadow-lg">
                 Hantar ke WhatsApp Admin
              </a>
            </div>
          `;
          form.reset();
        } else {
          msg.innerHTML = `
            <div class="bg-red-50 p-4 rounded-xl border border-red-200 text-red-700 text-center font-medium">
              ❌ ${res.message}
            </div>
          `;
        }
      }).submitBooking(formData);
    }

    function loadAdmin() {
      showSection('admin');
      const body = document.getElementById('tableBody');
      body.innerHTML = '<tr><td colspan="12" class="p-10 text-center">Memuatkan data...</td></tr>';

      google.script.run.withSuccessHandler(data => {
        const head = document.getElementById('tableHead');
        
        // Render Header
        head.innerHTML = data[0].map(h => `<th class="px-4 py-3 border-b text-left">${h}</th>`).join('') + '<th class="px-4 py-3 border-b">Aksi</th>';
        
        // Render Body
        body.innerHTML = data.slice(1).map(row => {
          const phone = row[3].replace(/[^0-9]/g, '');
          const waAdminUrl = `https://wa.me/${phone}`;

          return `
            <tr class="hover:bg-blue-50 transition border-b last:border-0">
              ${row.map((cell, index) => {
                if(index === 3) return `<td class="px-4 py-3"><a href="${waAdminUrl}" target="_blank" class="text-green-600 font-bold hover:underline">💬 ${cell}</a></td>`;
                if(index === 11) { // Kolum Status
                  let color = cell === 'Confirmed' ? 'bg-green-100 text-green-700' : (cell === 'Cancelled' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700');
                  return `<td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-bold ${color}">${cell}</span></td>`;
                }
                return `<td class="px-4 py-3">${cell}</td>`;
              }).join('')}
              <td class="px-4 py-3 text-center">
                 <select onchange="updateStatus('${row[0]}', this.value)" class="text-xs border rounded p-1 bg-white outline-none focus:border-blue-500">
                   <option value="">Ubah</option>
                   <option value="Confirmed">Sahkan</option>
                   <option value="Cancelled">Batal</option>
                   <option value="Completed">Selesai</option>
                 </select>
              </td>
            </tr>
          `;
        }).join('');
      }).getBookings();
    }

    function updateStatus(id, val) {
      if(!val) return;
      if(confirm(`Tukar status booking ${id} kepada ${val}?`)) {
        google.script.run.withSuccessHandler(res => {
          alert(res);
          loadAdmin();
        }).updateBookingStatus(id, val);
      }
    }
  </script>
</body>
</html>
